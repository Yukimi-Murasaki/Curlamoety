	#新创建的暗夜立方初始解锁的槽位数 [默认: 0，范围: 0-10]
	#0 = 无初始槽位（需要通过献祭解锁第一个槽位）
	#最好不要把初始槽位设置的比MAX_PAGE*3还要大
	#注意：此配置仅影响新创建的暗夜立方，已有存档不受影响
	#Range: 0 ~ 10
	initialUnlockedSlots = 1
	#════════════════════════════════════
	# 巫妖额外槽位配置
	#════════════════════════════════════
	#是否启用巫妖玩家的额外槽位增益 [默认: true]
	enableLichBonusSlots = true
	#巫妖玩家获得的额外槽位数量 [默认: 1，范围: 0-10]
	#注意：实际槽位数还受限于总功能槽数上限
	#Range: 0 ~ 10
	lichBonusSlotCount = 1
	#════════════════════════════════════
	# 献祭配方配置
	#════════════════════════════════════
	#
	#献祭配方列表，格式："modid:item_id;maxTimes;slotsPerSacrifice"
	#- modid:item_id: 物品注册名（必填）
	#- maxTimes: 最大献祭次数（0=无限次）
	#- slotsPerSacrifice: 每次献祭解锁的槽位数（至少1）
	#
	#示例：
	#  "enigmaticaddons:void_tome;5;1"  → 虚无之书，最多5次，每次1槽
	#  "minecraft:nether_star;0;3"      → 下界之星，无限次，每次3槽
	#  "somemod:special_scroll;1;15"    → 某mod的卷轴，1次全解锁
	sacrificeRecipes = ["enigmaticlegacy:ichor_bottle;1;1", "twilightforest:lich_trophy;1;1", "minecraft:nether_star;1;1", "goety:soul_ruby;1;1", "goety:night_beacon;1;1", "cataclysm:ignitium_ingot;1;1", "curlamoety:evernight_veil;1;1"]
	#════════════════════════════════════
	# 七咒之戒检查配置
	#════════════════════════════════════
	#是否启用七咒之戒资格检查 [默认: true]
	#启用后，ICursed 物品需要佩戴七咒之戒才能放入/生效
	#IEldritch 物品还需要七咒之戒佩戴时间 ≥ 99.5%
	#关闭后可让所有物品无限制使用
	requireCurseCheck = true

#---- 红宝石戒指 ----
[ruby_ring]
	#魔法攻击无敌帧削减量 [默认: 5.0]
	#Range: 0.0 ~ 100.0
	magicInvulReduction = 5.0

#════════════════════════════════════
# 附魔
#════════════════════════════════════
#---- 破势 ----
[breaking_stance]
	#每级附魔提供的仆从无敌帧削减加成 [默认: 0.5]
	#Range: 0.0 ~ 100.0
	bonusPerLevel = 0.5

#---- 戍卫 ----
[bulwark]
	#每级附魔提供的仆从伤害减免率 [默认: 0.01]
	#Range: 0.0 ~ 1.0
	damageReductionPerLevel = 0.01

#---- 咒术增幅 ----
[wand_power]
	#每级附魔提供的魔法伤害乘数加成 [默认: 0.05]
	#Range: 0.0 ~ 10.0
	magicDamageBonusPerLevel = 0.05

#---- 虚无之书 ----
[void_tome]
	#额外槽位数量 [默认: 2]
	#Range: 0 ~ 10
	bonusSlots = 2

#---- 失色卷轴 ----
[fading_scroll]
	#清除仇恨的间隔时间（ticks，20 ticks = 1秒） [默认: 300 = 15秒]
	#Range: 20 ~ 72000
	clearAggroIntervalTicks = 300
	#清除仇恨的作用半径（格） [默认: 32.0]
	#Range: 1.0 ~ 256.0
	clearAggroRadius = 32.0

#════════════════════════════════════
# 仆从类型配置
#════════════════════════════════════
#
#控制是否启用来自不同模组的仆从类型
#注意：即使启用，也需要对应模组已安装才会生效
#
[servant_config]
	#是否启用 Iron's Spells and Spellbooks 模组的法术召唤物作为仆从
	#需要安装 irons_spellbooks 模组 [默认: true]
	enableIronSpellsServants = true
	#是否启用 Modular Golems 模组的傀儡作为仆从
	#需要安装 modulargolems 模组 [默认: true]
	enableModularGolemsServants = true
	#是否启用原版可驯服动物作为仆从
	#也包括车万女仆[默认: true]
	enableVanillaTameableServants = true
	#是否禁止 Goety 的 Prisoner 开采以太矿石
	#Prisoner 的采矿是全自动零成本的，效率极高
	#启用后将阻止 Prisoner 将以太矿纳入采矿列表
	#[默认: false]（不禁止）
	disablePrisonerMiningEtheriumOre = false

#---- 无敌帧削减跳过条件 ----
[invul_reduction]
	#当攻击者主手或副手武器携带 goety_revelation:reality_piercer 附魔时，是否跳过本模组的无敌帧削减（让该附魔自己处理穿透）
	#需要安装 goety_revelation 模组 [默认: true]
	skipWhenRealityPiercer = true


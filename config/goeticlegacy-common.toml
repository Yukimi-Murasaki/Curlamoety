#---- 天堂之礼（重做：灵魂飞行） ----
#
#消耗灵魂能量获得创造飞行能力。
#每秒消耗 = maxSoulEnergy × soulCostPercentPerSecond + soulCostFixedPerSecond
#灵魂能量不足时自动取消飞行状态。
[heaven_scroll]
	#每秒消耗灵魂能量的百分比（0.01 = 1% 最大灵魂能量）
	#计算公式：消耗量 = maxSoulEnergy × soulCostPercentPerSecond + soulCostFixedPerSecond
	#取值范围：0.0~1.0 [默认: 0.01 = 1%]
	#Range: 0.0 ~ 1.0
	soulCostPercentPerSecond = 0.01
	#每秒消耗固定灵魂能量值
	#计算公式：消耗量 = maxSoulEnergy × soulCostPercentPerSecond + soulCostFixedPerSecond
	#取值范围：0~100000 [默认: 100]
	#Range: 0 ~ 100000
	soulCostFixedPerSecond = 100
	#消耗检查间隔（ticks，20 = 1秒）
	#数值越小消耗越平滑，但CPU开销略大
	#[默认: 10 = 每半秒消耗一次]
	#Range: 1 ~ 100
	checkInterval = 10

#════════════════════════════════════
# 暗夜契约卷轴配置
#════════════════════════════════════
#
#核心机制：与暗夜立方共鸣，所有效果仅在夜晚激活状态下生效
#- 夜色强度：随夜晚时间推移而增强的动态数值（0-1之间）
#- 午夜爆发：每天0:00触发的短时间强力增益窗口
#- 假夜晚：通过主动技能创造的夜晚状态，提供额外收益
#- 月相系统：不同月相提供差异化的增益效果
#
[night_scroll]
	#夜色强度指数系数
	#- 计算公式：boosted = strength^power
	#- 值越小，曲线越平缓，低强度时收益更高
	#- 值越大，曲线越陡峭，高强度时收益更高
	#- 推荐范围：0.5-0.9 [默认: 0.7]
	#Range: 0.0 ~ 10.0
	nightStrengthPower = 0.7
	#夜色强度最低保底值
	#- 防止夜色强度过低时完全无效
	#- 取值范围：0.0-1.0 [默认: 0.35]
	#Range: 0.0 ~ 1.0
	nightStrengthMin = 0.35
	#午夜Buff效果持续时间（内部使用，无需调整）
	#- 该效果每刻都会重新添加，时长仅需保证不中断即可
	#Range: 1 ~ 72000
	buffDuration = 40
	#午夜Buff效果等级（核心配置）
	#- 0 = I级, 1 = II级, 2 = III级
	#- 等级越高，增益效果越强
	#- 推荐范围：0-5 [默认: 2 = III级]
	#Range: 0 ~ 255
	buffAmplifier = 2
	#假夜晚斗志效果持续时间（内部使用，无需调整）
	#- 该效果每刻都会重新添加，时长仅需保证不中断即可
	#Range: 1 ~ 72000
	rallyingDuration = 60
	#假夜晚斗志效果等级（核心配置）
